<div id="page-settings" class="page">
  <div class="tabs" style="margin-bottom:24px">
    <div class="tab active">Company</div>
    <div class="tab">Users &amp; Roles</div>
    <div class="tab">Invoice Settings</div>
    <div class="tab">Notifications</div>
  </div>
  <div class="chart-card" style="max-width:640px">
    <div style="font-size:15px;font-weight:600;margin-bottom:20px">Company Information</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Company Name</label><input class="form-control" value="Vexogen"></div>
      <div class="form-group"><label class="form-label">GST Number</label><input class="form-control" value="33AABCV1234R1Z5"></div>
      <div class="form-group"><label class="form-label">Phone</label><input class="form-control" value="+91 98400 00000"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-control" value="hello@vexogen.com"></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">Address</label><textarea class="form-control" rows="2">Salem, Tamil Nadu 636001, India</textarea></div>
      <div class="form-group"><label class="form-label">Website</label><input class="form-control" value="www.vexogen.com"></div>
      <div class="form-group"><label class="form-label">Financial Year Start</label><select class="form-control"><option>April</option><option>January</option></select></div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline">Cancel</button>
      <button class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</div>
