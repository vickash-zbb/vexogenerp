<!-- pages/topbar.html -->
<!-- Shared Topbar + Notification Panel -->
<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="page-breadcrumb"><span>Vexogen</span><i class="ti ti-chevron-right" style="font-size:11px"></i><span id="breadcrumb">Overview</span></div>
    </div>
  </div>
  <div class="search-box">
    <i class="ti ti-search"></i>
    <input type="text" placeholder="Search clients, projects, invoices…">
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i><span class="notif-dot"></span></button>
    <button class="icon-btn"><i class="ti ti-plus"></i></button>
    <div class="user-chip">
      <div class="user-avatar">AK</div>
      <div class="user-name">Admin</div>
      <i class="ti ti-chevron-down" style="font-size:13px;color:var(--text-muted)"></i>
    </div>
  </div>
</div>

<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span style="font-size:14px;font-weight:600">Notifications</span>
    <span style="font-size:11.5px;color:var(--primary);cursor:pointer">Mark all read</span>
  </div>
  <div class="notif-item">
    <div class="notif-icon" style="background:var(--danger-light);color:var(--danger)"><i class="ti ti-alert-circle"></i></div>
    <div><div class="notif-text">Payment overdue — Nexus Brands (₹45,000)</div><div class="notif-time">2 hours ago</div></div>
  </div>
  <div class="notif-item">
    <div class="notif-icon" style="background:var(--primary-light);color:var(--primary)"><i class="ti ti-file-invoice"></i></div>
    <div><div class="notif-text">Invoice INV-2024-089 generated for Stellar Media</div><div class="notif-time">5 hours ago</div></div>
  </div>
  <div class="notif-item">
    <div class="notif-icon" style="background:var(--warning-light);color:var(--warning)"><i class="ti ti-clock"></i></div>
    <div><div class="notif-text">Project "Packaging Redesign" deadline tomorrow</div><div class="notif-time">1 day ago</div></div>
  </div>
  <div class="notif-item">
    <div class="notif-icon" style="background:var(--success-light);color:var(--success)"><i class="ti ti-check"></i></div>
    <div><div class="notif-text">Task "Logo Variations" approved by Priya S.</div><div class="notif-time">2 days ago</div></div>
  </div>
</div>
